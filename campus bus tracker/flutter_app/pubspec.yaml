name: campus_bus_tracker
description: "Smart Campus Bus Tracking & Schedule Management for NIT Mizoram"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  http: 1.5.0
  shared_preferences: 2.5.3
  intl: ^0.19.0
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1
  socket_io_client: ^3.0.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  fl_chart: ^0.70.2
  permission_handler: ^11.3.1
  geocoding: ^3.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
